services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netradar
      POSTGRES_USER: netradar
      POSTGRES_PASSWORD: change-before-deployment
    ports: ["5432:5432"]
    volumes: ["netradar-postgres:/var/lib/postgresql/data"]
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://netradar:change-before-deployment@postgres/netradar
      POLL_INTERVAL_SECONDS: 60
    ports: ["8000:8000"]
    depends_on: [postgres]
  gateway:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./deployment/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/srv/frontend:ro
      - caddy-data:/data
    depends_on: [backend]
volumes:
  netradar-postgres:
  caddy-data:
